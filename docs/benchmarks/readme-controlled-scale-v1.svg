<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc"><title id="title">Controlled synthetic scale</title><desc id="desc">The full 1,111,000-record corpus integrity counters are shown separately from a 768-record runtime sample across 96 matrix cells. LLM, tool, and network calls are zero and owner state is byte-stable.</desc><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#172033}.title{font-size:28px;font-weight:760}.sub{font-size:14px;fill:#536075}.eyebrow{font-size:12px;font-weight:760;letter-spacing:1px;fill:#31526f}.label{font-size:17px;font-weight:720}.value{font-size:27px;font-weight:790}.metric{font-size:15px;font-weight:680}.meta{font-size:12px;fill:#536075}.footer{font-size:13px;font-weight:700;fill:#536075}.card{fill:#f8fafc;stroke:#cbd7e5;stroke-width:1.5}.pill{fill:#e8f1ff;stroke:#8fb4e8}.track{fill:#e7edf5}.bar{fill:#2563eb}.marker{fill:#fff;stroke:#172033;stroke-width:2}</style><rect width="1200" height="700" fill="#fff"/><text class="title" x="48" y="52">Controlled synthetic scale</text><text class="sub" x="48" y="80">Full-corpus integrity and sampled runtime execution are separate denominators</text><rect class="card" x="48" y="112" width="1104" height="258" rx="18"/><text class="eyebrow" x="72" y="146">FULL CORPUS · integrity counters</text><text class="metric" x="72" y="180">Independent corpora · 1K · 10K · 100K · 1M</text><rect class="pill" x="72" y="210" width="324" height="112" rx="14"/><text class="label" x="90" y="244">Generated</text><text class="value" x="90" y="286">1,111,000/1,111,000</text><rect class="pill" x="426" y="210" width="324" height="112" rx="14"/><text class="label" x="444" y="244">Serialized</text><text class="value" x="444" y="286">1,111,000/1,111,000</text><rect class="pill" x="780" y="210" width="324" height="112" rx="14"/><text class="label" x="798" y="244">Parsed + schema validated</text><text class="value" x="798" y="286">1,111,000/1,111,000</text><text class="meta" x="72" y="349">96 family × locale × complexity matrix cells · parsed and schema validated is one combined stage</text><rect class="card" x="48" y="394" width="1104" height="184" rx="18"/><text class="eyebrow" x="72" y="430">SEPARATE 768-RECORD SAMPLE · runtime public seams</text><text class="value" x="72" y="484">768/768</text><text class="meta" x="72" y="510">named public Muse seams + terminal invariants</text><text class="metric" x="405" y="474">Matrix cells · 96</text><text class="metric" x="405" y="510">LLM / tool / network · 0 / 0 / 0</text><text class="metric" x="800" y="474">Owner state · BYTE-STABLE</text><text class="meta" x="800" y="510">sample execution, not full-corpus execution</text><text class="footer" x="48" y="625">Synthetic integrity is not personal learning or organic effectiveness.</text><text class="footer" x="48" y="650">1,111,000 records are not 1,111,000 agent runs · runtime sample = 768 records.</text></svg>
