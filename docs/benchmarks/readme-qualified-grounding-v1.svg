<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc"><title id="title">Qualified grounding checks</title><desc id="desc">Two independent controlled checks show faithfulness deltas with their raw ON and OFF denominators and false-refusal cost. They are not an aggregate score and have different sample sizes.</desc><style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;fill:#172033}.title{font-size:28px;font-weight:760}.sub{font-size:14px;fill:#536075}.eyebrow{font-size:12px;font-weight:760;letter-spacing:1px;fill:#31526f}.label{font-size:17px;font-weight:720}.value{font-size:27px;font-weight:790}.metric{font-size:15px;font-weight:680}.meta{font-size:12px;fill:#536075}.footer{font-size:13px;font-weight:700;fill:#536075}.card{fill:#f8fafc;stroke:#cbd7e5;stroke-width:1.5}.pill{fill:#e8f1ff;stroke:#8fb4e8}.track{fill:#e7edf5}.bar{fill:#2563eb}.marker{fill:#fff;stroke:#172033;stroke-width:2}</style><rect width="1200" height="600" fill="#fff"/><text class="title" x="48" y="52">Qualified grounding checks</text><text class="sub" x="48" y="80">Independent controlled checks · raw counts and false-refusal cost · distinct sample sizes</text><rect class="card" x="48" y="116" width="1104" height="174" rx="18"/><text class="eyebrow" x="72" y="146">INDEPENDENT CHECK 1</text><text class="label" x="72" y="176">Self-authored corpus</text><text class="value" x="72" y="227">+0.94</text><text class="meta" x="72" y="253">faithfulness delta</text><text class="metric" x="390" y="184">● Gate ON · 16/17 caught</text><text class="metric" x="390" y="224">○ Gate OFF · 0/17 caught</text><text class="metric" x="760" y="184">False-refusal delta · +0.00</text><text class="meta" x="760" y="224">ON 0/12 · OFF 0/12</text><rect class="track" x="390" y="246" width="330" height="12" rx="6"/><rect class="bar" x="390" y="246" width="310.5882352941176" height="12" rx="6"/><rect class="card" x="48" y="314" width="1104" height="174" rx="18"/><text class="eyebrow" x="72" y="344">INDEPENDENT CHECK 2</text><text class="label" x="72" y="374">SQuAD-2.0 slice</text><text class="value" x="72" y="425">+0.63</text><text class="meta" x="72" y="451">faithfulness delta</text><text class="metric" x="390" y="382">● Gate ON · 5/8 caught</text><text class="metric" x="390" y="422">○ Gate OFF · 0/8 caught</text><text class="metric" x="760" y="382">False-refusal delta · +0.00</text><text class="meta" x="760" y="422">ON 0/8 · OFF 0/8</text><rect class="track" x="390" y="444" width="330" height="12" rx="6"/><rect class="bar" x="390" y="444" width="206.25" height="12" rx="6"/><text class="footer" x="48" y="535">Two separate corpora (17 and 8 cases) · no average, ranking, or aggregate product score</text><text class="footer" x="48" y="560">Controlled component evidence is not organic personal effectiveness.</text></svg>
